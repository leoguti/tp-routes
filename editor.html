<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Routes - Rutas de Transporte Público</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="header">
        <h1>TP Routes</h1>
        <select id="region-select" style="padding:4px 8px;border-radius:4px;border:none;font-size:0.8rem;background:#2a2a4e;color:white;cursor:pointer;"></select>
        <span id="mode-indicator" class="mode-indicator stop-mode">Modo: Parada</span>
    </div>

    <div id="main">
        <div id="sidebar">
            <!-- Route info -->
            <div class="panel">
                <h3>Datos de la Ruta</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Referencia *</label>
                        <input type="text" id="route-ref" placeholder="Ej: T01" required>
                    </div>
                    <div class="form-group">
                        <label>Operador *</label>
                        <input type="text" id="route-operator" placeholder="Ej: Coflonorte" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Desde *</label>
                        <input type="text" id="route-from" placeholder="Origen" required>
                    </div>
                    <div class="form-group">
                        <label>Hasta *</label>
                        <input type="text" id="route-to" placeholder="Destino" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Red *</label>
                    <input type="text" id="route-network" placeholder="Ej: Transporte Intermunicipal Boyacá" value="Transporte Intermunicipal Boyacá" required>
                </div>
                <div id="route-name-preview" style="font-size:0.75rem;color:#6c757d;margin-top:4px;"></div>
            </div>

            <!-- Mode selector -->
            <div class="panel">
                <h3>Modo de edición</h3>
                <div class="form-row">
                    <button class="btn btn-danger" id="btn-mode-stop" style="flex:1">Parada (S)</button>
                    <button class="btn btn-primary" id="btn-mode-waypoint" style="flex:1">Waypoint (W)</button>
                </div>
                <div style="font-size:0.75rem;color:#6c757d;margin-top:6px;">
                    Parada = donde el bus se detiene<br>
                    Waypoint = punto de paso para guiar la ruta
                </div>
            </div>

            <!-- Stops list -->
            <div class="panel" style="flex:1;overflow-y:auto;">
                <h3>Puntos <span id="point-count" style="font-weight:400;text-transform:none;">0 paradas</span></h3>
                <ul id="stop-list"></ul>
            </div>

            <!-- Actions -->
            <div class="panel">
                <button class="btn btn-primary" id="btn-calculate" disabled>Calcular Ruta (Enter)</button>
                <button class="btn btn-success" id="btn-download" disabled>Descargar .osm</button>
                <button class="btn btn-outline" id="btn-clear" disabled>Limpiar Todo</button>
            </div>

            <!-- Status -->
            <div id="status"></div>
        </div>

        <div id="map">
            <div id="instructions"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/regions.js"></script>
    <script src="js/valhalla.js"></script>
    <script src="js/osm-export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
