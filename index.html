<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Routes - Rutas de Transporte Público</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; }
        #header {
            background: #1a1a2e;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #header h1 { font-size: 1.2rem; font-weight: 600; }
        #header span { font-size: 0.85rem; opacity: 0.7; }
        #map { height: calc(100vh - 48px); width: 100%; }
    </style>
</head>
<body>
    <div id="header">
        <h1>TP Routes</h1>
        <span>Rutas de Transporte Público — Boyacá, Colombia</span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([5.5353, -73.3678], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        L.marker([5.5353, -73.3678])
            .addTo(map)
            .bindPopup('Terminal de Transportes de Tunja')
            .openPopup();
    </script>
</body>
</html>
