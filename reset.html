<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Routes — Reset datos</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f4f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 32px; max-width: 440px; width: 100%; margin: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        h2 { color: #c0392b; margin-bottom: 8px; font-size: 1.1rem; }
        p { font-size: 0.85rem; color: #666; margin-bottom: 20px; line-height: 1.5; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.78rem; color: #555; margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 9px 12px; font-size: 0.85rem; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; margin-top: 4px; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-danger:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 16px; padding: 12px 14px; border-radius: 7px; font-size: 0.83rem; display: none; }
        .result.show { display: block; }
        .result.success { background: #e0fae8; color: #1a6b3a; }
        .result.error { background: #fde8e8; color: #8b1a1a; }
        .warning { background: #fff8e0; border: 1px solid #f0c040; border-radius: 7px; padding: 10px 14px; font-size: 0.8rem; color: #7a5c00; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>⚠️ Reset de datos</h2>
    <p>Borra rutas, operadores y terminal_routes de la región seleccionada. Esta acción no se puede deshacer.</p>

    <div class="warning">
        Solo para entornos de prueba. No usar en producción con datos reales.
    </div>

    <div class="form-group">
        <label>Región</label>
        <select id="region">
            <option value="boyaca">Boyacá</option>
            <option value="cochabamba">Cochabamba</option>
            <option value="">Todas las regiones</option>
        </select>
    </div>

    <div class="form-group">
        <label>Secret de confirmación</label>
        <input type="password" id="secret" placeholder="Ingresá el secret..." />
    </div>

    <button class="btn btn-danger" id="btn-reset" onclick="doReset()">
        Borrar todos los datos
    </button>

    <div class="result" id="result"></div>
</div>

<script>
async function doReset() {
    const secret = document.getElementById('secret').value.trim();
    const region = document.getElementById('region').value;

    if (!secret) {
        showResult('Ingresá el secret', 'error'); return;
    }

    const label = region ? `la región "${region}"` : 'TODAS las regiones';
    if (!confirm(`¿Seguro que querés borrar todos los datos de ${label}?\n\nEsta acción no se puede deshacer.`))
        return;

    const btn = document.getElementById('btn-reset');
    btn.disabled = true;
    btn.textContent = 'Borrando...';

    try {
        const res = await fetch('/api/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret, region: region || undefined })
        });
        const data = await res.json();

        if (res.ok) {
            const d = data.deleted;
            showResult(
                `✅ Borrado exitoso:\n• ${d.routes} rutas\n• ${d.operators} operadores\n• ${d.terminal_routes} rutas de terminal`,
                'success'
            );
        } else {
            showResult('Error: ' + data.error, 'error');
        }
    } catch (e) {
        showResult('Error de conexión: ' + e.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Borrar todos los datos';
}

function showResult(msg, type) {
    const el = document.getElementById('result');
    el.textContent = msg;
    el.className = `result ${type} show`;
}
</script>
</body>
</html>
